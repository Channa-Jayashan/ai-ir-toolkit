version: '3.9'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: gemma-ir-brain
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
      - ./Modelfile:/Modelfile:ro          # ← THIS IS THE FIX (mounts your host Modelfile)
    # Optional: uncomment later if you have NVIDIA GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  ollama-models:
